
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kantor Centrum Kraków</title>

    <style>
        body{
            margin:0;
            font-family:Arial,Helvetica,sans-serif;
            background:#111;
            color:white;
        }

        header{
            background:#000;
            color:gold;
            text-align:center;
            padding:30px;
            border-bottom:2px solid gold;
        }

        h1{
            margin:0;
            font-size:42px;
        }

        h2{
            color:gold;
            text-align:center;
        }

        .container{
            width:90%;
            max-width:1000px;
            margin:auto;
            padding:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th{
            background:gold;
            color:black;
            padding:12px;
        }

        td{
            border:1px solid #444;
            padding:12px;
            text-align:center;
        }

        tr:hover{
            background:#222;
        }

        .btn{
            display:inline-block;
            background:gold;
            color:black;
            padding:15px 25px;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            margin:10px;
        }

        footer{
            text-align:center;
            color:#999;
            padding:30px;
        }
    </style>

</head>

<body>

<header>
    <h1>KANTOR CENTRUM</h1>
    <p>Ponad 70 walut • Kraków ul. Zwierzyniecka 14</p>
</header>

<div class="container">

<h2>Aktualne kursy</h2>

<table>

<tr>
<th>Waluta</th>
<th>Kupno</th>
<th>Sprzedaż</th>
</tr>

<tbody id="ratesTable">
</tbody>

</table>

<br><br>

<h2>Rezerwacja waluty</h2>

<form>

<form onsubmit="sendWhatsApp(); return false;">

<label>Numer telefonu:</label><br>
<input id="phone" type="tel" placeholder="np. 600 000 000" required>

<br><br>

<label>Rodzaj transakcji:</label><br>
<select id="type">
<option>Kupuję walutę</option>
<option>Sprzedaję walutę</option>
</select>

<br><br>

<label>Waluta:</label><br>
<select id="currency">
<option>EUR</option>
<option>USD</option>
<option>GBP</option>
<option>CHF</option>
<option>NOK</option>
<option>SEK</option>
<option>Inna</option>
</select>

<br><br>

<label>Kwota:</label><br>
<input id="amount" type="number" placeholder="np. 1000" required>

<br><br>
    
<button type="button" onclick="calculate()">
    sprawdź wartość
</button>
    <p id="result"></p>
<p>
⏰ Rezerwacja kursu ważna do godziny od złożenia rezerwacji.
</p>

<a class="btn" href="https://wa.me/48793171110?text=Dzień%20dobry,%20chcę%20zarezerwować%20walutę." target="_blank">
📲 Wyślij rezerwację WhatsApp
</a>

</form>


</div>

<footer>

© Kantor Centrum Kraków

</footer>

    <script>
function sendWhatsApp(){

let phone = document.getElementById("phone").value;
let type = document.getElementById("type").value;
let currency = document.getElementById("currency").value;
let amount = document.getElementById("amount").value;

let message =
"Dzień dobry, chcę zarezerwować walutę.%0A%0A" +
"Transakcja: " + type + "%0A" +
"Waluta: " + currency + "%0A" +
"Kwota: " + amount + "%0A" +
"Telefon: " + phone;

window.open(
"https://wa.me/48793171110?text=" + message,
"_blank"
);

}
</script>

    <script>

const rates = {
    EUR: {
        buy: 4.24,
        sell: 4.28
    },
    USD: {
        buy: 3.63,
        sell: 3.68
    },
    GBP: {
        buy: 4.92,
        sell: 4.99
    },
    CHF: {
        buy: 4.50,
        sell: 4.57
    }
};


function calculate(){

let type = document.getElementById("type").value;
let currency = document.getElementById("currency").value;
let amount = Number(document.getElementById("amount").value);

let rate;

if(type=="Kupuję walutę"){
    rate = rates[currency].sell;
}
else{
    rate = rates[currency].buy;
}

let result = amount * rate;

document.getElementById("result").innerHTML =
"Kurs: " + rate.toFixed(2) + 
"<br>Wartość: " + result.toFixed(2) + " PLN";

}

</script>


    <script src="kursy.js"></script>

    <script>

let table = document.getElementById("ratesTable");

currencies.forEach(function(currency){

let row = '
<tr>
<td>${currency.code}</td>
<td>${currency.buy}</td>
<td>${currency.sell}</td>
</tr>'
;

table.innerHTML += row;

});

</script>
    
</body>
</html>
