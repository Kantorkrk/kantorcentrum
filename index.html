
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kantor Centrum Kraków</title>

    <style>
        body{
            margin:0;
            font-family:Arial,Helvetica,sans-serif;
            background:#111;
            color:white;
        }

        header{
            background:#000;
            color:gold;
            text-align:center;
            padding:30px;
            border-bottom:2px solid gold;
        }

        h1{
            margin:0;
            font-size:42px;
        }

        h2{
            color:gold;
            text-align:center;
        }

        .container{
            width:90%;
            max-width:1000px;
            margin:auto;
            padding:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th{
            background:gold;
            color:black;
            padding:12px;
        }

        td{
            border:1px solid #444;
            padding:12px;
            text-align:center;
        }

        tr:hover{
            background:#222;
        }

        .btn{
            display:inline-block;
            background:gold;
            color:black;
            padding:15px 25px;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            margin:10px;
        }

        footer{
            text-align:center;
            color:#999;
            padding:30px;
        }
    </style>

</head>

<body>

<header>
    <h1>KANTOR CENTRUM</h1>
    <p>Ponad 70 walut • Kraków</p>
</header>

<div class="container">

<h2>Aktualne kursy</h2>

<table>

<tr>
<th>Waluta</th>
<th>Kupno</th>
<th>Sprzedaż</th>
</tr>

<tr><td>EUR</td><td>4.26</td><td>4.355</td></tr>
<tr><td>USD</td><td>3.71</td><td>3.805</td></tr>
<tr><td>GBP</td><td>4.97</td><td>5.11</td></tr>
<tr><td>CHF</td><td>4.62</td><td>4.70</td></tr>
<tr><td>AUD</td><td>2.57</td><td>2.65</td></tr>
<tr><td>CAD</td><td>2.65</td><td>2.70</td></tr>

</table>

<br><br>

<h2>Rezerwacja waluty</h2>

<form>

<label>Numer telefonu:</label><br>
<input type="tel" placeholder="np. 793 17 11 10" required>
<br><br>

<label>Rodzaj transakcji: </label>label><br>
 <select> 
 <option>Kupuję walutę  
 </option>
     <option>Sprzedaję walutę
     </option>
    </select>

<br><br>

<label>Kwota:</label><br>
<input type="number" placeholder="np. 1000">
<br><br>

<label>Godzina odbioru:</label><br>
<input type="time">

<br><br>

<button class="btn" type="submit">
Zarezerwuj
</button>

</form>

</div>

<footer>

© Kantor Centrum Kraków

</footer>

</body>
</html>
